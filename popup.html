<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GPT-5 Mini Toggle</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>GPT-5 Mini</h1>
    <label class="switch">
      <input id="gpt5-toggle" type="checkbox">
      <span class="slider"></span>
    </label>
    <div class="label">Enable GPT-5 mini for all clients</div>
    <div id="status" class="status"></div>
    <small class="note">This toggle changes a local setting only. Server-side changes are required to actually enable the model for clients.</small>
      <hr>
      <div class="server-block">
        <h2>Server (optional)</h2>
        <label class="small">Server URL</label>
        <input id="server-url" placeholder="http://localhost:3000" />
        <label class="small">Admin token (optional)</label>
        <input id="server-token" placeholder="admin-token" />
        <label class="small-inline"><input id="sync-checkbox" type="checkbox"> Sync to server when toggled</label>
        <div id="server-status" class="status"></div>
      </div>
  </div>
  <script src="popup.js"></script>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
</body>
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, Arial; width: 360px; padding: 10px; }
      textarea { width: 100%; height: 120px; }
      button { width: 100%; margin-top: 8px; padding: 8px; }
      pre { white-space: pre-wrap; word-break: break-word; background: #111; color: #eee; padding: 8px; border-radius: 8px; }
      .row { margin-top: 8px; }
      input { width: 100%; padding: 6px; }
      small { opacity: 0.7; }
    </style>
  </head>
  <body>
    <h3>Privacy Policy Analyzer</h3>

    <div class="row">
      <label>Server Token</label>
      <input id="token" placeholder="paste X-Extension-Token here" />
      <small>Stored locally in your browser.</small>
    </div>

    <div class="row">
      <label>Policy text</label>
      <textarea id="text" placeholder="Paste privacy policy text here..."></textarea>
    </div>

    <button id="analyze">Analyze</button>

    <div class="row">
      <pre id="out">Output will appear here…</pre>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

</html>
