<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Privacy Policy Analyzer</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <!-- SECTION 1: Toggle -->
    <h1>GPT-5 Mini</h1>

    <label class="switch">
      <input id="gpt5-toggle" type="checkbox" />
      <span class="slider"></span>
    </label>

    <div class="label">Enable GPT-5 mini for all clients</div>
    <div id="status" class="status"></div>

    <small class="note">
      This toggle changes a local setting only. Server-side changes are required to actually enable the model for clients.
    </small>

    <hr />

    <!-- SECTION 2: Server Config (optional sync + token storage) -->
    <div class="server-block">
      <h2>Server (optional)</h2>

      <label class="small" for="server-url">Server URL</label>
      <input id="server-url" placeholder="https://your-service.onrender.com" />

      <label class="small" for="server-token">Admin token (optional)</label>
      <input id="server-token" placeholder="admin-token" />

      <label class="small-inline">
        <input id="sync-checkbox" type="checkbox" />
        Sync to server when toggled
      </label>

      <div id="server-status" class="status"></div>
    </div>

    <hr />

    <!-- SECTION 3: Analyzer -->
    <h2>Privacy Policy Analyzer</h2>

    <label class="small" for="token">Extension Token</label>
    <input id="token" placeholder="paste X-Extension-Token here" />
    <small class="note">Stored locally in your browser.</small>

    <label class="small" for="text">Policy text</label>
    <textarea id="text" placeholder="Paste privacy policy text here..."></textarea>

    <button id="analyze">Analyze</button>

    <pre id="out">Output will appear here…</pre>
  </div>

  <!-- Toasts should exist BEFORE popup.js runs -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Load script ONCE -->
  <script src="popup.js"></script>
</body>
</html>
