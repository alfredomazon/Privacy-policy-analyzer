<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evil Eye</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="icons/EvilEye48.png" alt="Evil Eye logo" />
        <div class="brand-text">
          <div class="brand-title">Evil Eye</div>
          <div class="brand-subtitle">Privacy policy analyzer</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="switch-row">
        <div class="switch-group">
          <div class="switch-title">Analyzer status</div>
          <div class="switch-subtitle" id="status">Loading...</div>
        </div>
        <div class="status-pill" id="heuristic-status">No analysis yet</div>
      </div>

      <div id="heuristic-score" class="status-text"></div>
    </div>

    <div class="card">
      <div class="row-between">
        <div class="section-title" style="margin-bottom: 0;">Page summary</div>
        <button id="heuristic-refresh" type="button">Refresh</button>
      </div>

      <div id="heuristic-summary" class="summary-box">
        No heuristic result yet. Refresh the page, then click Refresh.
      </div>

      <div style="height: 10px;"></div>

      <div class="small muted" style="margin-bottom: 6px;">Best policy link</div>
      <div id="heuristic-link" class="link-box">—</div>

      <div style="height: 10px;"></div>

      <div class="button-row">
        <button id="heuristic-open" type="button" disabled>Open policy page</button>
        <button id="auto-analyze" class="primary" type="button">Auto analyze</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Top findings</div>
      <div id="heuristic-findings"></div>
    </div>

    <details>
      <summary>
        <span>What this may mean</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card inner-card">
          <ul id="heuristic-reasons" class="clean-list"></ul>
        </div>
      </div>
    </details>

    <details>
      <summary>
        <span>Detected data categories</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card inner-card">
          <div id="data-checklist"></div>
        </div>
      </div>
    </details>
  </div>

  <div id="toast-container"></div>

  <script src="popup.js"></script>
</body>
</html>
