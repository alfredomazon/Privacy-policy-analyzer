<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evil Eye</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="icons/EvilEye48.png" alt="Evil Eye logo" />
        <div class="brand-text">
          <div class="brand-title">Evil Eye</div>
          <div class="brand-subtitle">Data Snitch</div>
        </div>
      </div>
    </div>

    <div id="policy-result-card" class="card">
      <div class="row-between">
        <div class="section-title" style="margin-bottom: 0;">Policy analysis</div>
        <button id="heuristic-refresh" class="primary" type="button">Refresh</button>
      </div>

      <div style="height: 10px;"></div>

      <div id="policy-finder-card">
        <div class="small muted" style="margin-bottom: 6px;">Policy source</div>
        <div id="policy-finder-status" class="summary-box">
          Analyzing policy source…
        </div>
      </div>

      <div style="height: 10px;"></div>

      <div id="policy-summary-card">
        <div id="heuristic-summary" class="summary-box">
          No policy analysis yet.
        </div>

        <div style="height: 10px;"></div>

        <div id="heuristic-score" class="status-text"></div>
      </div>

      <div style="height: 10px;"></div>

      <div class="small muted" style="margin-bottom: 6px;">Analyzed policy URL</div>
      <div id="heuristic-link" class="link-box">—</div>

      <div style="height: 10px;"></div>

      <div class="button-row">
        <button id="heuristic-open" type="button" disabled>Open policy page</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Top counted risks</div>
      <div id="heuristic-findings"></div>
    </div>

    <div class="card" id="mismatch-card">
      <div class="section-title">Policy vs Behavior</div>
      <div id="mismatch-status" class="status-text status-blue">
        No mismatch analysis yet.
      </div>
      <div id="mismatch-summary" class="summary-box" style="margin-top: 10px;">
        Open a page and refresh the extension.
      </div>
      <ul id="mismatch-list" class="clean-list" style="margin-top: 10px;"></ul>
    </div>

    <details>
      <summary>
        <span>What this may mean</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card inner-card">
          <ul id="heuristic-reasons" class="clean-list"></ul>
        </div>
      </div>
    </details>

    <details>
      <summary>
        <span>Detected data categories</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card inner-card">
          <div id="data-checklist"></div>
        </div>
      </div>
    </details>
  </div>

  <div id="toast-container"></div>

  <script src="popup.js"></script>
</body>
</html>
