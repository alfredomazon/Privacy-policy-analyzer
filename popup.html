<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evil Eye</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a21;
      --panel-2: #1d2330;
      --text: #e8ecf3;
      --muted: #aab4c5;
      --line: #2b3445;
      --accent: #7aa2ff;
      --good: #2fbf71;
      --warn: #f3b33d;
      --bad: #ef5b5b;
      --chip: #222a39;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 420px;
      min-height: 620px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      background: #111;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.2px;
      color: #f0f4fa;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .small {
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--chip);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      max-width: 100%;
    }

    .score-line {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .summary-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
    }

    .link-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
      word-break: break-word;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: 120ms ease;
    }

    button:hover {
      border-color: #4a5a77;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #081120;
      border-color: transparent;
    }

    .danger {
      background: #3a1f24;
      color: #ffd6da;
      border-color: #5f3138;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 12px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.4;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .field {
      margin-bottom: 10px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .switch-title {
      font-size: 13px;
      font-weight: 700;
    }

    .switch-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #3c465a;
      border: 1px solid #54627c;
      border-radius: 999px;
      transition: 0.18s ease;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: white;
      transition: 0.18s ease;
    }

    .toggle input:checked + .slider {
      background: #6c95ff;
      border-color: #7aa2ff;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }

    ul.clean-list {
      margin: 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    ul.clean-list li {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text);
    }

    .checklist-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .check-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .check-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .check-box {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid #5e6d89;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: transparent;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .check-box.checked {
      background: rgba(47, 191, 113, 0.16);
      border-color: rgba(47, 191, 113, 0.9);
      color: #9ff3c3;
    }

    .check-text {
      min-width: 0;
    }

    .check-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }

    .check-evidence {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 4px;
    }

    .check-quote {
      font-size: 11px;
      color: #c8d2e4;
      line-height: 1.45;
      margin-top: 5px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      word-break: break-word;
    }

    .finding-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .finding-card:last-child {
      margin-bottom: 0;
    }

    .finding-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .finding-meta {
      font-size: 11px;
      color: var(--warn);
      line-height: 1.3;
    }

    .finding-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .finding-evidence {
      font-size: 11px;
      color: #c8d2e4;
      line-height: 1.45;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 7px 8px;
      word-break: break-word;
    }

    pre.output {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.45;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      color: var(--text);
      min-height: 92px;
      max-height: 240px;
      overflow: auto;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    details summary {
      list-style: none;
      cursor: pointer;
      padding: 12px;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    .details-content {
      padding: 0 12px 12px 12px;
      border-top: 1px solid var(--line);
    }

    .summary-caret {
      font-size: 11px;
      color: var(--muted);
    }

    #toast-container {
      position: fixed;
      right: 10px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      pointer-events: none;
    }

    .toast {
      opacity: 0;
      transform: translateY(8px);
      transition: 180ms ease;
      pointer-events: none;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #1f2633;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      border-color: rgba(47, 191, 113, 0.4);
    }

    .toast.error {
      border-color: rgba(239, 91, 91, 0.45);
    }
  </style>
</head>
<body>

        <div class="brand-text">

    <div class="card">

    </div>

    <div class="card">
      <div class="section-title">Top findings</div>

    </div>

    <details>
      <summary>
        <span>What this may mean</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card" style="box-shadow: none; margin-top: 10px;">
          <ul id="heuristic-reasons" class="clean-list"></ul>
        </div>
      </div>
    </details>

    <details>
      <summary>
        <span>Detected data categories</span>
        <span class="summary-caret">Expand</span>
      </summary>
      <div class="details-content">
        <div class="card" style="box-shadow: none; margin-top: 10px;">
          <div id="data-checklist"></div>
        </div>
      </div>
    </details>
